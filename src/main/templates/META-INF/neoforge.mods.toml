modLoader="javafml" 
loaderVersion="${loader_version_range}" 
license="${mod_license}"

[[mods]] 
modId="${mod_id}" 
version="${mod_version}" 
displayName="${mod_name}" 
displayURL="https://modrinth.com/mod/createfluidlogistic"
logoFile="icon.png" #optional
authors="${mod_authors}" #optional
description='''${mod_description}'''

[[mixins]]
config="fluidlogistics.mixins.json"

[[dependencies.${mod_id}]] 
    modId="neoforge" 
    type="required" 
    versionRange="[${neo_version},)" 
    ordering="NONE"
    side="BOTH"

